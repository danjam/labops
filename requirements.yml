  - name: community.docker
    version: ">=3.0.0"

  # General utilities
  - name: ansible.posix
    version: ">=1.5.0"  # For reboot module and other posix-related tasks

  # Windows support
  - name: ansible.windows
    version: ">=1.12.0"

  # General utilities
  - name: community.general
    version: ">=6.0.0"


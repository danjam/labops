---
# Initial play to validate secrets only once
- hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Check and validate secrets
      include_tasks: ../tasks/check_secrets.yml
      tags: always

# Regular playbooks that use the secrets
- hosts: ubuntu
  vars_files:
    - { path: "../vars/secrets.yml", skip_missing: no }  # Fail if file is missing
  roles:
    - role: ubuntu_update
      vars:
        upgrade_type: full
        auto_reboot: true
        reboot_timeout: 300

- hosts: docker_hosts
  vars_files:
    - { path: "../vars/secrets.yml", skip_missing: no }  # Fail if file is missing
  roles:
    - role: docker_compose_deploy
      vars:
        docker_compose_project_dir: /opt/homelab
---
# Ansible Galaxy requirements file

# Collections required by this project
collections:
  # Required for docker_compose_deploy role
  - name: community.docker
    version: ">=3.1.0"

  # Required for ubuntu_update role (reboot module)
  - name: ansible.posix
    version: ">=1.5.0"

  # Windows support
  - name: ansible.windows
    version: ">=1.14.0"

  # General utilities
  - name: community.general
    version: ">=6.1.0"
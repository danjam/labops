---
- name: Start Docker containers
  community.docker.docker_compose_v2:
    project_src: "{{ docker_compose_project_dir }}"
    files: "{{ docker_compose_file }}"
    state: present
    remove_orphans: yes
    pull: always
  tags:
    - deploy

- name: Remove unused Docker resources
  community.docker.docker_prune:
    containers: yes
    images: yes
    networks: yes
    volumes: yes
    builder_cache: yes
    images_filters:
      dangling: false
